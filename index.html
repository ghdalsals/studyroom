<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Care Concierge Seat Status</title>
    <style>
        :root {
            --grid-gap: 10px;
            --page-bg: #FAFBFC;
            --board-bg: #FFFFFF;
            --seat-inactive: #EEF2F6;
            --seat-border: #DCE3EA;
            --title-text: #1F2937;
            --body-text: #475569;
            --timestamp-text: #94A3B8;
            --available-seat: #4ADE80;
            --occupied-seat: #F87171;
            --button-bg: #EEF2F6;
            --button-hover: #E2E8F0;
            --button-text: #475569;
            --button-border: #EEF2F6;
            --soft-shadow: 0 2px 8px rgba(15, 23, 42, 0.06);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 20px;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background: var(--page-bg);
            color: var(--body-text);
        }

        .page {
            max-width: 1120px;
            margin: 0 auto;
            text-align: center;
        }

        h1 {
            margin: 0 0 18px;
            font-size: 2rem;
            color: var(--title-text);
        }

        .header-layout {
            display: grid;
            grid-template-columns: 1fr;
            justify-content: center;
            align-items: start;
            gap: 14px;
            margin: 0 auto 18px;
            max-width: 430px;
        }

        .dashboard {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 14px;
        }

        .stat-box {
            min-width: 190px;
            padding: 14px 24px;
            border-radius: 14px;
            color: white;
            font-weight: 700;
            box-shadow: var(--soft-shadow);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .stat-box.available {
            background: var(--available-seat);
        }

        .stat-box.occupied {
            background: var(--occupied-seat);
        }

        .topbar {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin: 0;
        }

        .topbar .top-button {
            flex: 0 0 auto;
            width: 74px;
        }

        .top-button {
            width: 74px;
            border: 1px solid var(--button-border);
            border-radius: 12px;
            padding: 8px 0;
            font-size: 0.88rem;
            font-weight: 700;
            cursor: pointer;
            color: var(--button-text);
            background: var(--button-bg);
            transition: background-color 0.15s ease, box-shadow 0.15s ease, transform 0.15s ease;
            box-shadow: var(--soft-shadow);
        }

        .top-button.settings {
            background: var(--button-bg);
            border-color: var(--button-bg);
        }

        .top-button.details {
            background: var(--button-bg);
            border-color: var(--button-bg);
        }

        .top-button:hover {
            background: var(--button-hover);
            border-color: var(--button-hover);
            transform: translateY(-1px);
        }

        .top-button.active {
            box-shadow: 0 0 0 2px rgba(148, 163, 184, 0.24), var(--soft-shadow);
        }

        .settings-panel {
            margin: 0 auto 16px;
            max-width: 980px;
            padding: 16px;
            border-radius: 18px;
            background: var(--board-bg);
            box-shadow: var(--soft-shadow);
            border: 1px solid var(--seat-border);
        }

        .settings-panel[hidden] {
            display: none;
        }

        .settings-actions {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 0;
        }

        .settings-actions button {
            border: 1px solid var(--button-border);
            border-radius: 999px;
            padding: 10px 16px;
            font-size: 0.92rem;
            font-weight: 700;
            cursor: pointer;
            background: var(--button-bg);
            color: var(--button-text);
            box-shadow: var(--soft-shadow);
        }

        .settings-actions button:hover {
            background: var(--button-hover);
            border-color: var(--button-hover);
        }

        #update-time {
            color: var(--timestamp-text);
            margin-top: 14px;
        }

        .board-wrap {
            overflow: hidden;
            padding: 14px;
            background: var(--board-bg);
            border-radius: 18px;
            box-shadow: var(--soft-shadow);
            border: 1px solid var(--seat-border);
        }

        #board {
            display: grid;
            width: 100%;
            margin: 0 auto;
            gap: var(--grid-gap);
        }

        .chalkboard {
            border: 1px solid var(--seat-border);
            border-radius: 10px;
            background: var(--seat-inactive);
            color: var(--body-text);
            width: clamp(180px, 34%, 320px);
            aspect-ratio: 11 / 1;
            display: flex;
            align-items: center;
            justify-content: center;
            justify-self: center;
            align-self: center;
            font-size: 0.82rem;
            font-weight: 700;
            letter-spacing: 0.04em;
            box-shadow: var(--soft-shadow);
        }

        .seat {
            border: 1px solid var(--seat-border);
            border-radius: 12px;
            width: 100%;
            min-width: 0;
            min-height: 0;
            aspect-ratio: 3 / 2;
            padding: 8px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 5px;
            font-weight: 700;
            box-shadow: var(--soft-shadow);
            transition: transform 0.15s ease, opacity 0.15s ease;
        }

        .seat.available {
            background: var(--available-seat);
            color: var(--title-text);
        }

        .seat.in-use {
            background: var(--occupied-seat);
            color: var(--title-text);
        }

        .seat.uncertain {
            background: #FBBF24;
            color: var(--title-text);
        }

        .seat.slot-empty {
            background: var(--seat-inactive);
            color: var(--body-text);
        }

        .seat.readonly {
            cursor: default;
        }

        .seat-text {
            font-size: 0.94rem;
            line-height: 1.15;
        }

        .seat-meta {
            font-size: 0.8rem;
            line-height: 1.1;
        }

        @media (max-width: 720px) {
            :root {
                --grid-gap: 8px;
            }

            body {
                padding: 14px;
            }

            .stat-box {
                min-width: 150px;
            }

            .topbar .top-button,
            .top-button {
                width: 68px;
                font-size: 0.84rem;
                padding: 7px 0;
            }
        }

        @media (max-width: 520px) {
            .header-layout {
                max-width: 260px;
            }

            .dashboard {
                grid-template-columns: 1fr;
            }

            .topbar {
                gap: 8px;
            }
        }
    </style>
</head>
<body>
    <div class="page">
        <h1 id="page-title"></h1>

        <div class="header-layout">
            <div class="dashboard">
                <div class="stat-box available">
                    <span id="available-label"></span>: <span id="count-empty">0</span>
                </div>
                <div class="stat-box occupied">
                    <span id="occupied-label"></span>: <span id="count-occupied">0</span>
                </div>
            </div>

            <div class="topbar">
                <button id="settings-toggle" class="top-button settings" type="button"></button>
                <button id="details-toggle" class="top-button details" type="button"></button>
            </div>
        </div>

        <section id="settings-panel" class="settings-panel" hidden>
            <div class="settings-actions">
                <button id="rotate-layout" type="button"></button>
            </div>
        </section>

        <div class="board-wrap">
            <div id="board"></div>
        </div>

        <div id="update-time"></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <script>
        const TEXT = {
            pageTitle: "실시간 좌석 현황",
            available: "사용 가능",
            occupied: "사용 중",
            settings: "설정",
            details: "상세",
            rotateLayout: "180도 회전",
            chalkboard: "칠판",
            pinPrompt: "설정을 열려면 관리자 PIN을 입력하세요.",
            pinWrong: "PIN이 일치하지 않아 설정을 열 수 없습니다.",
            updateWaiting: "마지막 업데이트: 대기 중...",
            updatePrefix: "마지막 업데이트: ",
            unknown: "확인 불가",
            connectionError: "마지막 업데이트: 연결 오류",
            emptySlot: "빈 슬롯",
            noInfo: "정보 없음"
        };

        const firebaseConfig = {
            databaseURL: "https://studyroom-a6399-default-rtdb.firebaseio.com/"
        };

        const STORAGE_KEY = "care-concierge-classroom-layout-v5";
        const LAYOUT_PATH = "studyroom/layout_config";
        const SETTINGS_PIN = "2468"; // 실제 배포 전 변경 권장
        const AISLE_RATIO = 0.5;
        const GROUPS = [1, 2, 2, 2, 2];

        function buildBaseLayout() {
            const slots = [];
            let totalColumns = 0;

            GROUPS.forEach((groupWidth, index) => {
                totalColumns += groupWidth;
                if (index < GROUPS.length - 1) {
                    totalColumns += 1;
                }
            });

            for (let row = 0; row < 5; row += 1) {
                let x = 0;

                GROUPS.forEach((groupWidth, groupIndex) => {
                    for (let seatOffset = 0; seatOffset < groupWidth; seatOffset += 1) {
                        slots.push({ x: x + seatOffset, y: row });
                    }

                    x += groupWidth;
                    if (groupIndex < GROUPS.length - 1) {
                        x += 1;
                    }
                });
            }

            return { cols: totalColumns, rows: 5, slots };
        }

        const BASE_LAYOUT = buildBaseLayout();

        const state = {
            seats: [],
            seatOrder: [],
            layout: cloneLayout(BASE_LAYOUT),
            isSettingsOpen: false,
            showDetails: false,
            hasSeatSnapshot: false,
            hasRemoteLayout: false
        };

        let layoutRef = null;

        const elements = {
            pageTitle: document.getElementById("page-title"),
            availableLabel: document.getElementById("available-label"),
            occupiedLabel: document.getElementById("occupied-label"),
            countEmpty: document.getElementById("count-empty"),
            countOccupied: document.getElementById("count-occupied"),
            board: document.getElementById("board"),
            updateTime: document.getElementById("update-time"),
            settingsToggle: document.getElementById("settings-toggle"),
            detailsToggle: document.getElementById("details-toggle"),
            settingsPanel: document.getElementById("settings-panel"),
            rotateLayout: document.getElementById("rotate-layout")
        };

        function applyStaticText() {
            document.title = TEXT.pageTitle;
            elements.pageTitle.textContent = TEXT.pageTitle;
            elements.availableLabel.textContent = TEXT.available;
            elements.occupiedLabel.textContent = TEXT.occupied;
            elements.settingsToggle.textContent = TEXT.settings;
            elements.detailsToggle.textContent = TEXT.details;
            elements.rotateLayout.textContent = TEXT.rotateLayout;
            elements.updateTime.textContent = TEXT.updateWaiting;
        }

        function cloneLayout(layout) {
            return {
                cols: layout.cols,
                rows: layout.rows,
                slots: layout.slots.map((slot) => ({ ...slot }))
            };
        }

        function isValidLayout(layout) {
            return Boolean(
                layout &&
                Number.isInteger(layout.cols) &&
                Number.isInteger(layout.rows) &&
                Array.isArray(layout.slots) &&
                layout.slots.length === BASE_LAYOUT.slots.length
            );
        }

        function normalizeSeatOrder(order) {
            const next = Array(BASE_LAYOUT.slots.length).fill(null);

            if (!Array.isArray(order)) {
                return next;
            }

            order.slice(0, next.length).forEach((seatId, index) => {
                next[index] = typeof seatId === "string" && seatId ? seatId : null;
            });

            return next;
        }

        function compareSeatIds(left, right) {
            return left.localeCompare(right, undefined, { numeric: true, sensitivity: "base" });
        }

        function loadSavedState() {
            try {
                const raw = localStorage.getItem(STORAGE_KEY);
                if (!raw) return;

                const saved = JSON.parse(raw);
                state.layout = isValidLayout(saved.layout) ? cloneLayout(saved.layout) : cloneLayout(BASE_LAYOUT);
                state.seatOrder = normalizeSeatOrder(saved.seatOrder);
            } catch (error) {
                state.layout = cloneLayout(BASE_LAYOUT);
                state.seatOrder = normalizeSeatOrder([]);
            }
        }

        function cacheState() {
            localStorage.setItem(
                STORAGE_KEY,
                JSON.stringify({
                    layout: state.layout,
                    seatOrder: state.seatOrder
                })
            );
        }

        function applySharedLayout(data) {
            if (!data || !isValidLayout(data.layout)) {
                return false;
            }

            state.layout = cloneLayout(data.layout);
            state.seatOrder = normalizeSeatOrder(data.seatOrder);
            cacheState();
            return true;
        }

        function saveState() {
            cacheState();

            if (!layoutRef) return;

            layoutRef.set({
                layout: state.layout,
                seatOrder: state.seatOrder,
                updated_at: new Date().toISOString()
            }).catch((error) => {
                console.error("Firebase layout save error:", error);
                window.alert("레이아웃 저장 중 오류가 발생했습니다.");
            });
        }

        function normalizeSeats(rawSeats) {
            const seats = Array.isArray(rawSeats) ? rawSeats : Object.values(rawSeats || {});

            return seats
                .filter(Boolean)
                .map((seat, index) => ({
                    ...seat,
                    seat_id: String(seat.seat_id ?? `Seat-${index + 1}`)
                }));
        }

        function syncSeatOrder() {
            if (!state.hasSeatSnapshot) {
                return false;
            }

            const before = JSON.stringify(state.seatOrder);
            const liveIds = state.seats.map((seat) => seat.seat_id).sort(compareSeatIds);
            const liveSet = new Set(liveIds);
            const kept = state.seatOrder.filter((seatId) => seatId && liveSet.has(seatId));
            const seen = new Set(kept);

            liveIds.forEach((seatId) => {
                if (!seen.has(seatId) && kept.length < BASE_LAYOUT.slots.length) {
                    kept.push(seatId);
                    seen.add(seatId);
                }
            });

            state.seatOrder = normalizeSeatOrder(kept);
            return before !== JSON.stringify(state.seatOrder);
        }

        function getSeatMap() {
            return new Map(state.seats.map((seat) => [seat.seat_id, seat]));
        }

        function getSeatClass(seat) {
            if (!seat) return "slot-empty";
            if (seat.state === "empty") return "available";
            if (seat.state === "occupied") return "in-use";
            return "uncertain";
        }

        function requestSettingsAccess() {
            const enteredPin = window.prompt(TEXT.pinPrompt, "");

            if (enteredPin === null) {
                return false;
            }

            if (enteredPin !== SETTINGS_PIN) {
                window.alert(TEXT.pinWrong);
                return false;
            }

            return true;
        }

        function renderControls() {
            elements.settingsPanel.hidden = !state.isSettingsOpen;
            elements.settingsToggle.classList.toggle("active", state.isSettingsOpen);
            elements.detailsToggle.classList.toggle("active", state.showDetails);
        }

        function buildColumnTemplate(layout) {
            const occupiedColumns = new Set(layout.slots.map((slot) => slot.x));

            return Array.from({ length: layout.cols }, (_, colIndex) => {
                return occupiedColumns.has(colIndex) ? "1fr" : `${AISLE_RATIO}fr`;
            }).join(" ");
        }

        function isLayoutRotated180(layout) {
            const firstSlot = layout.slots[0];
            return Boolean(
                firstSlot &&
                firstSlot.x === layout.cols - 1 &&
                firstSlot.y === layout.rows - 1
            );
        }

        // 요청 반영: 기본 상태에서는 칠판이 아래, 180도 회전 시 위
        function getChalkboardPlacement(layout) {
            const rotated = isLayoutRotated180(layout);

            return {
                row: rotated ? 1 : layout.rows + 1,
                seatRowOffset: rotated ? 1 : 0,
                templateRows: rotated
                    ? `auto repeat(${layout.rows}, auto)`
                    : `repeat(${layout.rows}, auto) auto`
            };
        }

        function renderBoard() {
            const detailsVisible = state.showDetails || state.isSettingsOpen;
            const seatMap = getSeatMap();
            const chalkboardPlacement = getChalkboardPlacement(state.layout);

            elements.board.innerHTML = "";
            elements.board.style.gridTemplateColumns = buildColumnTemplate(state.layout);
            elements.board.style.gridTemplateRows = chalkboardPlacement.templateRows;

            const chalkboard = document.createElement("div");
            chalkboard.className = "chalkboard";
            chalkboard.textContent = TEXT.chalkboard;
            chalkboard.style.gridColumn = "1 / -1";
            chalkboard.style.gridRow = String(chalkboardPlacement.row);
            elements.board.appendChild(chalkboard);

            state.layout.slots.forEach((slot, index) => {
                const seatId = state.seatOrder[index];
                const seat = seatId ? seatMap.get(seatId) : null;
                const button = document.createElement("button");

                button.type = "button";
                button.className = `seat ${getSeatClass(seat)} readonly`;
                button.style.gridColumn = String(slot.x + 1);
                button.style.gridRow = String(slot.y + 1 + chalkboardPlacement.seatRowOffset);

                if (detailsVisible) {
                    const label = document.createElement("div");
                    const meta = document.createElement("div");

                    label.className = "seat-text";
                    meta.className = "seat-meta";

                    if (seat) {
                        label.textContent = seat.seat_id;
                        meta.textContent = typeof seat.confidence === "number"
                            ? `${Math.round(seat.confidence * 100)}%`
                            : TEXT.noInfo;
                    } else {
                        label.textContent = TEXT.emptySlot;
                        meta.textContent = "";
                    }

                    button.appendChild(label);
                    button.appendChild(meta);
                }

                elements.board.appendChild(button);
            });
        }

        function renderStats(data) {
            elements.countEmpty.textContent = data.empty_count ?? 0;
            elements.countOccupied.textContent = data.occupied_count ?? 0;
            elements.updateTime.textContent = TEXT.updatePrefix + (data.updated_at ?? TEXT.unknown);
        }

        function rotateLayout180() {
            const current = cloneLayout(state.layout);
            current.slots = current.slots.map((slot) => ({
                x: current.cols - slot.x - 1,
                y: current.rows - slot.y - 1
            }));
            state.layout = current;
            saveState();
            renderBoard();
        }

        elements.settingsToggle.addEventListener("click", () => {
            if (!state.isSettingsOpen && !requestSettingsAccess()) {
                return;
            }

            if (!state.isSettingsOpen) {
                state.showDetails = false;
            }

            state.isSettingsOpen = !state.isSettingsOpen;
            renderControls();
            renderBoard();
        });

        elements.detailsToggle.addEventListener("click", () => {
            if (state.isSettingsOpen) {
                state.isSettingsOpen = false;
                state.showDetails = true;
            } else {
                state.showDetails = !state.showDetails;
            }

            renderControls();
            renderBoard();
        });

        elements.rotateLayout.addEventListener("click", rotateLayout180);

        applyStaticText();
        loadSavedState();
        renderControls();
        renderBoard();

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const statusRef = db.ref("studyroom/live_status");
        layoutRef = db.ref(LAYOUT_PATH);

        layoutRef.on("value", (snapshot) => {
            state.hasRemoteLayout = true;

            if (applySharedLayout(snapshot.val())) {
                if (syncSeatOrder()) {
                    saveState();
                }
                renderBoard();
                return;
            }

            saveState();
        }, (error) => {
            console.error("Firebase layout sync error:", error);
        });

        statusRef.on("value", (snapshot) => {
            const data = snapshot.val() || {};
            state.seats = normalizeSeats(data.seats);
            state.hasSeatSnapshot = true;

            if (syncSeatOrder() && state.hasRemoteLayout) {
                saveState();
            }

            renderStats(data);
            renderBoard();
        }, (error) => {
            elements.updateTime.textContent = TEXT.connectionError;
            console.error("Firebase data error:", error);
        });
    </script>
</body>
</html>
