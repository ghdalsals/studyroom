<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>실시간 좌석 현황</title>
    <style>
        :root {
            --page-bg: #F8FAFC;
            --board-bg: #FFFFFF;
            --seat-inactive: #E7ECF2;
            --seat-border: #D6DEE8;
            --available-seat: #4ADE80;
            --occupied-seat: #F87171;
            --uncertain-seat: #FBBF24;
            --title-text: #1F2937;
            --body-text: #475569;
            --timestamp-text: #64748B;
            --button-bg: #D6DCE3;
            --button-hover: #C8D0D9;
            --button-text: #334155;
            --button-border: #D6DCE3;
            --soft-shadow: 0 1px 4px rgba(15, 23, 42, 0.05);
            --panel-shadow: 0 8px 26px rgba(15, 23, 42, 0.05);
            --viewport-pad: 20px;
            --seat-width: 92px;
            --seat-col-track: var(--seat-width);
            --gap-track: 10px;
            --gap-track-wide: calc(var(--seat-width) / 3);
            --row-gap-track-wide: calc(var(--seat-width) / 3);
        }

        html {
            height: 100%;
        }

        * {
            box-sizing: border-box;
        }

        body {
            min-height: 100dvh;
            margin: 0;
            font-family: "Segoe UI", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
            background: var(--page-bg);
            color: var(--body-text);
            overflow-x: hidden;
            overflow-y: auto;
        }

        button,
        input {
            font: inherit;
        }

        .viewport-shell {
            width: 100%;
            min-height: 100dvh;
            padding: var(--viewport-pad);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            overflow: visible;
        }

        .page {
            width: min(1120px, calc(100vw - (var(--viewport-pad) * 2)));
            max-width: 1120px;
            text-align: center;
            transform: scale(var(--page-scale, 1));
            transform-origin: top center;
        }

        h1 {
            margin: 0 0 18px;
            font-size: clamp(1.9rem, 3vw, 2.2rem);
            color: var(--title-text);
            letter-spacing: -0.03em;
        }

        .header-layout {
            display: grid;
            grid-template-columns: 1fr;
            justify-content: center;
            align-items: start;
            gap: 14px;
            margin: 0 auto 18px;
            max-width: 660px;
        }

        .dashboard {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 14px;
        }

        .stat-box {
            min-width: 190px;
            padding: 14px 24px;
            border-radius: 14px;
            color: #FFFFFF;
            font-weight: 700;
            box-shadow: var(--soft-shadow);
            border: 1px solid rgba(255, 255, 255, 0.18);
        }

        .stat-box.available {
            background: var(--available-seat);
        }

        .stat-box.occupied {
            background: var(--occupied-seat);
        }

        .stat-box.uncertain {
            background: var(--uncertain-seat);
        }

        .topbar {
            display: flex;
            justify-content: center;
            align-items: stretch;
            gap: 12px;
            margin: 0;
        }

        .topbar .top-button {
            flex: 0 0 96px;
            width: 96px;
        }

        .mode-toggle {
            position: relative;
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            align-items: center;
            width: 168px;
            height: 44px;
            padding: 4px;
            border: 1px solid var(--button-border);
            border-radius: 16px;
            background: var(--button-bg);
            box-shadow: var(--soft-shadow);
            cursor: pointer;
        }

        .mode-label {
            position: relative;
            z-index: 1;
            padding: 8px 0;
            font-size: 0.88rem;
            font-weight: 700;
            color: var(--button-text);
            text-align: center;
            transition: color 0.15s ease;
        }

        .mode-toggle-thumb {
            position: absolute;
            top: 4px;
            left: 4px;
            width: calc(50% - 4px);
            height: calc(100% - 8px);
            border-radius: 12px;
            background: #FFFFFF;
            box-shadow: var(--soft-shadow);
            transition: transform 0.18s ease;
        }

        .mode-toggle.expert .mode-toggle-thumb {
            transform: translateX(100%);
        }

        .mode-toggle:not(.expert) .mode-label.general,
        .mode-toggle.expert .mode-label.expert {
            color: var(--title-text);
        }

        .top-button {
            width: 92px;
            height: 44px;
            border: 1px solid var(--button-border);
            border-radius: 14px;
            padding: 0;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            color: var(--button-text);
            background: var(--button-bg);
            transition: background-color 0.15s ease, box-shadow 0.15s ease;
            box-shadow: var(--soft-shadow);
        }

        .top-button:hover {
            background: var(--button-hover);
        }

        .top-button.active {
            box-shadow: 0 0 0 2px rgba(111, 119, 132, 0.24), var(--soft-shadow);
        }

        .settings-panel {
            margin: 0 auto 16px;
            max-width: 980px;
            padding: 16px;
            border-radius: 18px;
            background: var(--board-bg);
            box-shadow: var(--panel-shadow);
            border: 1px solid var(--seat-border);
            text-align: left;
        }

        .settings-panel[hidden] {
            display: none;
        }

        .settings-toolbar {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            align-items: end;
            margin-bottom: 0;
        }

        .settings-toolbar button {
            height: 44px;
            border: 1px solid var(--button-border);
            border-radius: 999px;
            padding: 0 16px;
            font-size: 0.92rem;
            font-weight: 700;
            cursor: pointer;
            background: var(--button-bg);
            color: var(--button-text);
            box-shadow: var(--soft-shadow);
        }

        .settings-toolbar button:hover {
            background: var(--button-hover);
        }

        .settings-field {
            display: grid;
            gap: 6px;
            text-align: left;
            font-size: 0.85rem;
            color: var(--body-text);
        }

        .settings-field input {
            width: 96px;
            height: 44px;
            padding: 10px 12px;
            border: 1px solid var(--seat-border);
            border-radius: 12px;
            background: #FFFFFF;
            color: var(--title-text);
            font-size: 0.95rem;
        }

        .settings-editor {
            display: grid;
            gap: 12px;
            justify-items: center;
        }

        .settings-subtle {
            font-size: 0.86rem;
            color: var(--timestamp-text);
            text-align: center;
        }

        .settings-subtle[hidden] {
            display: none;
        }

        .gap-editor {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--seat-border);
            border-radius: 16px;
            background: var(--page-bg);
            overflow-x: auto;
        }

        .gap-editor[hidden] {
            display: none;
        }

        .editor-grid {
            display: grid;
            gap: 8px;
            justify-content: center;
            min-width: fit-content;
        }

        .editor-seat {
            width: 34px;
            height: 22px;
            border: 1px solid var(--seat-border);
            border-radius: 8px;
            background: var(--seat-inactive);
        }

        .gap-toggle {
            position: relative;
            border: none;
            padding: 0;
            background: transparent;
            cursor: pointer;
            border-radius: 999px;
        }

        .gap-toggle::before {
            content: "";
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border-radius: 999px;
            background: var(--seat-border);
            transition: background-color 0.15s ease, transform 0.15s ease;
        }

        .gap-toggle.col {
            width: 18px;
            height: 22px;
        }

        .gap-toggle.col::before {
            width: 6px;
            height: 18px;
        }

        .gap-toggle.row {
            width: 34px;
            height: 18px;
        }

        .gap-toggle.row::before {
            width: 28px;
            height: 6px;
        }

        .gap-toggle.active::before {
            background: var(--button-text);
            transform: translate(-50%, -50%) scale(1.08);
        }

        .gap-corner {
            width: 18px;
            height: 18px;
        }

        .board-wrap {
            overflow: hidden;
            padding: 18px;
            background: var(--board-bg);
            border-radius: 18px;
            box-shadow: var(--panel-shadow);
            border: 1px solid var(--seat-border);
        }

        .board-stage {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .board-stage.is-rotated {
            flex-direction: column-reverse;
        }

        .chalkboard {
            border: 1px solid var(--seat-border);
            border-radius: 10px;
            background: var(--seat-inactive);
            color: var(--body-text);
            width: clamp(180px, 34%, 320px);
            min-height: 34px;
            display: flex;
            align-items: center;
            justify-content: center;
            align-self: center;
            font-size: 0.82rem;
            font-weight: 700;
            letter-spacing: 0.04em;
            box-shadow: var(--soft-shadow);
        }

        .board-scroll {
            overflow: hidden;
            padding: 6px;
        }

        .seat-grid {
            display: grid;
            justify-content: center;
            align-content: start;
            min-width: fit-content;
            margin: 0 auto;
            transform: rotate(var(--grid-rotation, 0deg));
            transform-origin: center;
        }

        .seat-grid.animate-rotation {
            transition: transform 0.2s ease;
        }

        .seat-grid.is-rotated .seat-card__content {
            transform: rotate(180deg);
        }

        .seat-grid.animate-rotation .seat-card__content {
            transition: transform 0.2s ease;
        }

        .seat-grid .gap-toggle {
            width: 100%;
            height: 100%;
            border-radius: 14px;
            align-self: stretch;
            justify-self: stretch;
            z-index: 1;
        }

        .seat-grid .gap-toggle::before {
            background: rgba(148, 163, 184, 0.54);
            box-shadow: var(--soft-shadow);
        }

        .seat-grid .gap-toggle.col::before {
            width: min(8px, calc(100% - 2px));
            height: max(28px, calc(100% - 18px));
        }

        .seat-grid .gap-toggle.row::before {
            width: max(28px, calc(100% - 18px));
            height: min(8px, calc(100% - 2px));
        }

        .seat-grid .gap-toggle.active::before {
            background: var(--button-text);
            transform: translate(-50%, -50%) scale(1.08);
        }

        .seat-grid .gap-toggle:hover::before {
            background: rgba(51, 65, 85, 0.72);
            transform: translate(-50%, -50%) scale(1.05);
        }

        .seat-card {
            border: 1px solid var(--seat-border);
            border-radius: 12px;
            width: 100%;
            aspect-ratio: 3 / 2;
            min-width: 0;
            min-height: 0;
            padding: 8px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 5px;
            font-weight: 700;
            box-shadow: var(--soft-shadow);
            transition: box-shadow 0.15s ease, transform 0.15s ease, background-color 0.15s ease;
            background: var(--seat-inactive);
            color: var(--title-text);
        }

        .seat-card.readonly {
            cursor: default;
        }

        .seat-card.resettable {
            cursor: pointer;
        }

        .seat-card.resettable:hover {
            box-shadow: 0 0 0 3px rgba(111, 119, 132, 0.18), var(--soft-shadow);
        }

        .seat-card.available {
            background: var(--available-seat);
        }

        .seat-card.occupied {
            background: var(--occupied-seat);
        }

        .seat-card.uncertain {
            background: var(--uncertain-seat);
        }

        .seat-card.slot-empty {
            background: var(--seat-inactive);
            color: var(--body-text);
        }

        .seat-card.selected {
            box-shadow: 0 0 0 3px rgba(111, 119, 132, 0.2), var(--soft-shadow);
        }

        .seat-card__content {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 4px;
            width: 100%;
            height: 100%;
            text-align: center;
        }

        .seat-text {
            font-size: 0.94rem;
            line-height: 1.15;
        }

        .seat-meta {
            font-size: 0.8rem;
            line-height: 1.1;
            color: rgba(31, 41, 55, 0.82);
        }

        .seat-card.slot-empty .seat-meta {
            color: var(--timestamp-text);
        }

        #update-time {
            margin-top: 14px;
            color: var(--timestamp-text);
        }

        @media (max-width: 720px) {
            :root {
                --viewport-pad: 14px;
            }

            .stat-box {
                min-width: 150px;
            }

            .top-button {
                width: 84px;
            }
        }

        @media (max-width: 520px) {
            .header-layout {
                max-width: 260px;
            }

            .dashboard {
                grid-template-columns: 1fr;
            }

            .topbar {
                gap: 10px;
                flex-wrap: wrap;
            }

            .settings-panel {
                padding: 14px;
            }

            .board-wrap {
                padding: 14px;
            }

            .seat-text {
                font-size: 0.84rem;
            }

            .seat-meta {
                font-size: 0.72rem;
            }
        }
    </style>
</head>
<body>
    <div id="viewport-shell" class="viewport-shell">
    <div id="page-root" class="page">
        <h1 id="page-title">실시간 좌석 현황</h1>

        <div class="header-layout">
            <div class="dashboard">
                <div class="stat-box available"><span id="available-label">사용 가능</span>: <span id="count-empty">0</span></div>
                <div class="stat-box occupied"><span id="occupied-label">사용 중</span>: <span id="count-occupied">0</span></div>
                <div class="stat-box uncertain"><span id="uncertain-label">확인 필요</span>: <span id="count-uncertain">0</span></div>
            </div>

            <div class="topbar">
                <button id="settings-toggle" class="top-button" type="button" aria-expanded="false">설정</button>
                <button id="mode-toggle" class="mode-toggle" type="button" role="switch" aria-checked="false">
                    <span id="mode-general" class="mode-label general">일반</span>
                    <span id="mode-expert" class="mode-label expert">전문가</span>
                    <span class="mode-toggle-thumb"></span>
                </button>
            </div>
        </div>

        <section id="settings-panel" class="settings-panel" hidden>
            <div class="settings-toolbar">
                <label class="settings-field">
                    <span id="rows-label">행 수</span>
                    <input id="rows-input" type="number" min="1" max="20" inputmode="numeric">
                </label>
                <label class="settings-field">
                    <span id="cols-label">열 수</span>
                    <input id="cols-input" type="number" min="1" max="20" inputmode="numeric">
                </label>
                <button id="apply-dimensions" type="button">행/열 적용</button>
                <button id="reset-seats" type="button">좌석 재설정</button>
                <button id="rotate-layout" type="button">180도 회전</button>
            </div>

            <div class="settings-editor">
                <div id="settings-note" class="settings-subtle" hidden></div>
                <div id="gap-editor" class="gap-editor"></div>
            </div>
        </section>

        <div class="board-wrap">
            <div id="board-stage" class="board-stage">
                <div class="chalkboard">칠판</div>
                <div class="board-scroll">
                    <div id="seat-grid" class="seat-grid"></div>
                </div>
            </div>
        </div>

        <div id="update-time">마지막 업데이트: 대기 중</div>
    </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script>
        const TEXT = {
            pageTitle: "실시간 좌석 현황",
            available: "사용 가능",
            occupied: "사용 중",
            uncertain: "확인 필요",
            settings: "설정",
            general: "일반",
            expert: "전문가",
            rows: "행 수",
            cols: "열 수",
            applyDimensions: "행/열 적용",
            resetSeats: "좌석 재설정",
            finishReset: "재설정 완료",
            rotateLayout: "180도 회전",
            gapEditor: "",
            resetHelp: "슬롯을 클릭한 순서대로 seat_1, seat_2, seat_3 ... 이 배치됩니다.",
            emptySlot: "빈 슬롯",
            noInfo: "confidence -",
            updatedPrefix: "마지막 업데이트: ",
            waitingUpdate: "마지막 업데이트: 대기 중",
            connectionError: "마지막 업데이트: 연결 오류",
            clickToAssign: "클릭해서 배치",
            clickToRemove: "클릭하면 해제"
        };

        const firebaseConfig = {
            databaseURL: "https://studyroom-a6399-default-rtdb.firebaseio.com/"
        };

        const LIVE_STATUS_PATH = "studyroom/live_status";
        const LAYOUT_CONFIG_PATH = "studyroom/layout_config";
        const STORAGE_KEY = "studyroom.classroom.layout.v1";
        const DEFAULT_LAYOUT_SETTINGS = {
            seatRows: 5,
            seatCols: 6,
            colGaps: [],
            rowGaps: [],
            rotation180: false
        };

        const collator = new Intl.Collator("ko-KR", { numeric: true, sensitivity: "base" });

        const state = {
            expertMode: false,
            settingsOpen: false,
            resetMode: false,
            resetSelection: [],
            layoutSettings: normalizeLayoutSettings(DEFAULT_LAYOUT_SETTINGS),
            seatOrder: buildDefaultSeatOrder(getSlotCount(DEFAULT_LAYOUT_SETTINGS)),
            layoutUpdatedAt: 0,
            pendingLayoutUpdatedAt: 0,
            visualRotationDeg: 0,
            visualRotation180: false,
            rotationAnimationUntil: 0,
            liveStatus: {
                emptyCount: 0,
                occupiedCount: 0,
                uncertainCount: 0,
                updatedAt: "",
                seatsById: {}
            },
            firebaseReady: false
        };

        let layoutRef = null;
        let viewportFitFrame = 0;
        let deferredLayoutSnapshot = null;

        const elements = {
            viewportShell: document.getElementById("viewport-shell"),
            pageRoot: document.getElementById("page-root"),
            pageTitle: document.getElementById("page-title"),
            availableLabel: document.getElementById("available-label"),
            occupiedLabel: document.getElementById("occupied-label"),
            uncertainLabel: document.getElementById("uncertain-label"),
            countEmpty: document.getElementById("count-empty"),
            countOccupied: document.getElementById("count-occupied"),
            countUncertain: document.getElementById("count-uncertain"),
            settingsToggle: document.getElementById("settings-toggle"),
            modeToggle: document.getElementById("mode-toggle"),
            modeGeneral: document.getElementById("mode-general"),
            modeExpert: document.getElementById("mode-expert"),
            settingsPanel: document.getElementById("settings-panel"),
            rowsLabel: document.getElementById("rows-label"),
            colsLabel: document.getElementById("cols-label"),
            rowsInput: document.getElementById("rows-input"),
            colsInput: document.getElementById("cols-input"),
            applyDimensions: document.getElementById("apply-dimensions"),
            resetSeats: document.getElementById("reset-seats"),
            rotateLayout: document.getElementById("rotate-layout"),
            settingsNote: document.getElementById("settings-note"),
            gapEditor: document.getElementById("gap-editor"),
            boardStage: document.getElementById("board-stage"),
            boardScroll: document.querySelector(".board-scroll"),
            seatGrid: document.getElementById("seat-grid"),
            updateTime: document.getElementById("update-time")
        };

        function getSlotCount(layoutSettings = state.layoutSettings) {
            return layoutSettings.seatRows * layoutSettings.seatCols;
        }

        function buildDefaultSeatOrder(slotCount) {
            return Array.from({ length: slotCount }, (_, index) => "seat_" + (index + 1));
        }

        function safeParse(value, fallback) {
            if (!value) {
                return fallback;
            }

            try {
                return JSON.parse(value);
            } catch (error) {
                return fallback;
            }
        }

        function parseTimestamp(value) {
            if (typeof value === "number" && Number.isFinite(value)) {
                return value;
            }

            if (typeof value === "string" && value.trim()) {
                const parsed = Date.parse(value);
                return Number.isNaN(parsed) ? 0 : parsed;
            }

            return 0;
        }

        function normalizeInt(value, fallback, min = 1, max = 20) {
            const parsed = Number.parseInt(value, 10);
            if (!Number.isInteger(parsed)) {
                return fallback;
            }
            return Math.min(max, Math.max(min, parsed));
        }

        function normalizeGapList(raw, gapCount) {
            const source = Array.isArray(raw)
                ? raw
                : raw && typeof raw === "object"
                    ? Object.values(raw)
                    : [];

            return Array.from(new Set(source
                .map((value) => Number(value))
                .filter((value) => Number.isInteger(value) && value >= 0 && value < gapCount)))
                .sort((left, right) => left - right);
        }

        function normalizeLayoutSettings(raw) {
            const seatRows = normalizeInt(raw && raw.seatRows, DEFAULT_LAYOUT_SETTINGS.seatRows);
            const seatCols = normalizeInt(raw && raw.seatCols, DEFAULT_LAYOUT_SETTINGS.seatCols);

            return {
                seatRows,
                seatCols,
                colGaps: normalizeGapList(raw && raw.colGaps, Math.max(0, seatCols - 1)),
                rowGaps: normalizeGapList(raw && raw.rowGaps, Math.max(0, seatRows - 1)),
                rotation180: Boolean(raw && raw.rotation180)
            };
        }

        function normalizeSeatOrder(raw, slotCount, fallbackOrder) {
            const next = Array(slotCount).fill(null);

            if (Array.isArray(raw)) {
                raw.slice(0, slotCount).forEach((seatId, index) => {
                    next[index] = typeof seatId === "string" && seatId.trim() ? seatId.trim() : null;
                });
                return next;
            }

            if (raw && typeof raw === "object") {
                Object.entries(raw).forEach(([rawIndex, seatId]) => {
                    const index = Number.parseInt(rawIndex, 10);
                    if (!Number.isInteger(index) || index < 0 || index >= slotCount) {
                        return;
                    }
                    next[index] = typeof seatId === "string" && seatId.trim() ? seatId.trim() : null;
                });
                return next;
            }

            if (fallbackOrder !== undefined) {
                return normalizeSeatOrder(fallbackOrder, slotCount);
            }

            return next;
        }

        function serializeSeatOrder(order) {
            const serialized = {};

            normalizeSeatOrder(order, order.length).forEach((seatId, index) => {
                if (seatId) {
                    serialized[index] = seatId;
                }
            });

            return serialized;
        }

        function isValidLegacyLayout(layout) {
            return Boolean(
                layout &&
                Number.isInteger(layout.cols) &&
                Number.isInteger(layout.rows) &&
                Array.isArray(layout.slots)
            );
        }

        function isLegacyLayoutRotated180(layout) {
            const firstSlot = layout && layout.slots && layout.slots[0];
            return Boolean(
                firstSlot &&
                firstSlot.x === layout.cols - 1 &&
                firstSlot.y === layout.rows - 1
            );
        }

        function layoutSettingsFromLegacyLayout(layout) {
            if (!isValidLegacyLayout(layout)) {
                return normalizeLayoutSettings(DEFAULT_LAYOUT_SETTINGS);
            }

            const xPositions = Array.from(new Set(layout.slots.map((slot) => slot.x))).sort((left, right) => left - right);
            const yPositions = Array.from(new Set(layout.slots.map((slot) => slot.y))).sort((left, right) => left - right);
            const colGaps = [];
            const rowGaps = [];

            for (let index = 0; index < xPositions.length - 1; index += 1) {
                if (xPositions[index + 1] - xPositions[index] > 1) {
                    colGaps.push(index);
                }
            }

            for (let index = 0; index < yPositions.length - 1; index += 1) {
                if (yPositions[index + 1] - yPositions[index] > 1) {
                    rowGaps.push(index);
                }
            }

            return normalizeLayoutSettings({
                seatRows: yPositions.length || DEFAULT_LAYOUT_SETTINGS.seatRows,
                seatCols: xPositions.length || DEFAULT_LAYOUT_SETTINGS.seatCols,
                colGaps,
                rowGaps,
                rotation180: isLegacyLayoutRotated180(layout)
            });
        }

        function getLayoutSettingsFromPayload(payload) {
            if (payload && payload.layoutSettings) {
                return normalizeLayoutSettings(payload.layoutSettings);
            }

            if (payload && isValidLegacyLayout(payload.layout)) {
                return layoutSettingsFromLegacyLayout(payload.layout);
            }

            return null;
        }

        function cacheLayoutState() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify({
                layoutSettings: state.layoutSettings,
                seatOrder: state.seatOrder,
                layoutUpdatedAt: state.layoutUpdatedAt
            }));
        }

        function loadSavedLayout() {
            const saved = safeParse(localStorage.getItem(STORAGE_KEY), null);

            if (!saved || typeof saved !== "object") {
                state.layoutSettings = normalizeLayoutSettings(DEFAULT_LAYOUT_SETTINGS);
                state.seatOrder = buildDefaultSeatOrder(getSlotCount(state.layoutSettings));
                state.layoutUpdatedAt = 0;
                syncVisualRotation(true);
                return;
            }

            const layoutSettings = getLayoutSettingsFromPayload(saved) || normalizeLayoutSettings(DEFAULT_LAYOUT_SETTINGS);
            const slotCount = getSlotCount(layoutSettings);

            state.layoutSettings = layoutSettings;
            state.seatOrder = normalizeSeatOrder(saved.seatOrder, slotCount, buildDefaultSeatOrder(slotCount));
            state.layoutUpdatedAt = parseTimestamp(saved.layoutUpdatedAt || saved.updated_at);
            syncVisualRotation(true);
        }

        function formatUpdatedAt(value) {
            if (!value) {
                return TEXT.updatedPrefix + "대기 중";
            }

            const parsed = new Date(value);
            if (!Number.isNaN(parsed.getTime())) {
                return TEXT.updatedPrefix + parsed.toLocaleString("ko-KR");
            }

            return TEXT.updatedPrefix + String(value);
        }

        function normalizeSeatState(value) {
            const normalized = String(value || "").trim().toLowerCase();

            if (["empty", "available", "vacant", "idle"].includes(normalized)) {
                return "empty";
            }

            if (["occupied", "using", "busy", "in_use"].includes(normalized)) {
                return "occupied";
            }

            return "uncertain";
        }

        function normalizeConfidence(value) {
            const parsed = Number(value);
            if (!Number.isFinite(parsed)) {
                return null;
            }

            if (parsed <= 1) {
                return Math.round(Math.max(0, parsed) * 100);
            }

            return Math.max(0, Math.min(100, Math.round(parsed)));
        }

        function normalizeLiveSeats(rawSeats) {
            const source = Array.isArray(rawSeats)
                ? rawSeats.map((seat) => [null, seat])
                : rawSeats && typeof rawSeats === "object"
                    ? Object.entries(rawSeats)
                    : [];

            return source
                .filter(([, seat]) => Boolean(seat))
                .map(([seatKey, seat]) => ({
                    seat_id: String((seat && seat.seat_id) || seatKey || "").trim(),
                    state: normalizeSeatState(seat && seat.state),
                    confidence: normalizeConfidence(seat && seat.confidence)
                }))
                .filter((seat) => seat.seat_id)
                .sort((left, right) => collator.compare(left.seat_id, right.seat_id));
        }

        function buildPreviewSeatOrder() {
            const next = Array(getSlotCount()).fill(null);

            state.resetSelection.forEach((slotIndex, orderIndex) => {
                if (slotIndex >= 0 && slotIndex < next.length) {
                    next[slotIndex] = "seat_" + (orderIndex + 1);
                }
            });

            return next;
        }

        function shouldShowDetails() {
            return state.expertMode || state.settingsOpen || state.resetMode;
        }

        function getSeatOrderForRender() {
            return state.resetMode ? buildPreviewSeatOrder() : state.seatOrder;
        }

        function getSeatInfo(seatId) {
            return seatId ? state.liveStatus.seatsById[seatId] || null : null;
        }

        function getSeatClass(seatId, seatInfo) {
            if (!seatId) {
                return "slot-empty";
            }

            if (!seatInfo) {
                return "slot-empty";
            }

            if (seatInfo.state === "empty") {
                return "available";
            }

            if (seatInfo.state === "occupied") {
                return "occupied";
            }

            return "uncertain";
        }

        function formatConfidence(confidence) {
            if (confidence == null) {
                return TEXT.noInfo;
            }

            return "confidence " + confidence + "%";
        }

        function mapGapIndex(kind, index) {
            if (!state.layoutSettings.rotation180) {
                return index;
            }

            const maxIndex = kind === "col"
                ? state.layoutSettings.seatCols - 2
                : state.layoutSettings.seatRows - 2;

            return Math.max(0, maxIndex - index);
        }

        function buildGridTemplate(kind) {
            const seatCount = kind === "col" ? state.layoutSettings.seatCols : state.layoutSettings.seatRows;
            const gapSet = new Set(kind === "col" ? state.layoutSettings.colGaps : state.layoutSettings.rowGaps);
            const seatTrack = kind === "col" ? "var(--seat-col-track)" : "auto";
            const tightGapTrack = "var(--gap-track)";
            const wideGapTrack = kind === "col" ? "var(--gap-track-wide)" : "var(--row-gap-track-wide)";
            const tracks = [];

            for (let index = 0; index < seatCount; index += 1) {
                tracks.push(seatTrack);

                if (index < seatCount - 1) {
                    tracks.push(gapSet.has(index) ? wideGapTrack : tightGapTrack);
                }
            }

            return tracks.join(" ");
        }

        function getElementInnerWidth(element) {
            const styles = window.getComputedStyle(element);
            const paddingLeft = Number.parseFloat(styles.paddingLeft) || 0;
            const paddingRight = Number.parseFloat(styles.paddingRight) || 0;
            return Math.max(0, element.clientWidth - paddingLeft - paddingRight);
        }

        function updateBoardMetrics() {
            if (!elements.boardScroll || !elements.pageRoot) {
                return;
            }

            const seatCols = state.layoutSettings.seatCols;
            const wideColGapCount = state.layoutSettings.colGaps.length;
            const tightColGapCount = Math.max(0, seatCols - 1 - wideColGapCount);
            const boardInnerWidth = Math.max(120, getElementInnerWidth(elements.boardScroll));
            const tightGap = Math.max(6, Math.min(12, Math.round(boardInnerWidth / 90)));
            const seatWidth = (boardInnerWidth - (tightColGapCount * tightGap)) / Math.max(1, seatCols + (wideColGapCount / 3));
            const normalizedSeatWidth = Math.max(18, seatWidth);
            const aisleGap = normalizedSeatWidth / 3;

            elements.pageRoot.style.setProperty("--seat-width", normalizedSeatWidth.toFixed(2) + "px");
            elements.pageRoot.style.setProperty("--gap-track", tightGap + "px");
            elements.pageRoot.style.setProperty("--gap-track-wide", aisleGap.toFixed(2) + "px");
            elements.pageRoot.style.setProperty("--row-gap-track-wide", aisleGap.toFixed(2) + "px");
        }

        function fitPageToViewport() {
            if (!elements.viewportShell || !elements.pageRoot) {
                return;
            }

            updateBoardMetrics();
            elements.pageRoot.style.setProperty("--page-scale", "1");

            const availableWidth = elements.viewportShell.clientWidth;
            const availableHeight = elements.viewportShell.clientHeight;
            const naturalWidth = elements.pageRoot.offsetWidth;
            const naturalHeight = elements.pageRoot.offsetHeight;
            const widthScale = naturalWidth > 0 ? availableWidth / naturalWidth : 1;
            const heightScale = naturalHeight > 0 ? availableHeight / naturalHeight : 1;
            const nextScale = state.settingsOpen
                ? Math.min(1, widthScale)
                : Math.min(1, widthScale, heightScale);

            elements.pageRoot.style.setProperty("--page-scale", String(nextScale));
        }

        function scheduleViewportFit() {
            if (viewportFitFrame) {
                cancelAnimationFrame(viewportFitFrame);
            }

            viewportFitFrame = requestAnimationFrame(() => {
                viewportFitFrame = 0;
                fitPageToViewport();
            });
        }

        function renderStaticText() {
            document.title = TEXT.pageTitle;
            elements.pageTitle.textContent = TEXT.pageTitle;
            elements.availableLabel.textContent = TEXT.available;
            elements.occupiedLabel.textContent = TEXT.occupied;
            elements.uncertainLabel.textContent = TEXT.uncertain;
            elements.settingsToggle.textContent = TEXT.settings;
            elements.modeGeneral.textContent = TEXT.general;
            elements.modeExpert.textContent = TEXT.expert;
            elements.rowsLabel.textContent = TEXT.rows;
            elements.colsLabel.textContent = TEXT.cols;
            elements.applyDimensions.textContent = TEXT.applyDimensions;
            elements.rotateLayout.textContent = TEXT.rotateLayout;
        }

        function renderControls() {
            elements.settingsPanel.hidden = !state.settingsOpen;
            elements.settingsToggle.classList.toggle("active", state.settingsOpen);
            elements.settingsToggle.setAttribute("aria-expanded", String(state.settingsOpen));
            elements.modeToggle.classList.toggle("expert", state.expertMode);
            elements.modeToggle.setAttribute("aria-checked", String(state.expertMode));
            elements.rowsInput.value = String(state.layoutSettings.seatRows);
            elements.colsInput.value = String(state.layoutSettings.seatCols);
            elements.resetSeats.textContent = state.resetMode ? TEXT.finishReset : TEXT.resetSeats;
            elements.settingsNote.hidden = !state.resetMode;
            elements.settingsNote.textContent = state.resetMode ? TEXT.resetHelp : "";
            elements.gapEditor.hidden = true;
        }

        function renderStats() {
            elements.countEmpty.textContent = String(state.liveStatus.emptyCount);
            elements.countOccupied.textContent = String(state.liveStatus.occupiedCount);
            elements.countUncertain.textContent = String(state.liveStatus.uncertainCount);
            elements.updateTime.textContent = formatUpdatedAt(state.liveStatus.updatedAt);
        }

        function renderBoard() {
            const seatOrder = getSeatOrderForRender();
            const showDetails = shouldShowDetails();
            const slotCount = getSlotCount();
            const showGapControls = state.settingsOpen && !state.resetMode;

            syncVisualRotation();
            elements.boardStage.classList.toggle("is-rotated", state.layoutSettings.rotation180);
            elements.seatGrid.classList.toggle("is-rotated", state.layoutSettings.rotation180);
            elements.seatGrid.classList.toggle("animate-rotation", Date.now() < state.rotationAnimationUntil);
            elements.seatGrid.style.setProperty("--grid-rotation", state.visualRotationDeg + "deg");
            elements.seatGrid.style.gridTemplateColumns = buildGridTemplate("col");
            elements.seatGrid.style.gridTemplateRows = buildGridTemplate("row");
            elements.seatGrid.innerHTML = "";

            for (let slotIndex = 0; slotIndex < slotCount; slotIndex += 1) {
                const rowIndex = Math.floor(slotIndex / state.layoutSettings.seatCols);
                const colIndex = slotIndex % state.layoutSettings.seatCols;
                const seatId = seatOrder[slotIndex];
                const seatInfo = getSeatInfo(seatId);
                const card = document.createElement("button");
                const content = document.createElement("div");
                const label = document.createElement("div");
                const meta = document.createElement("div");

                card.type = "button";
                card.className = "seat-card " + getSeatClass(seatId, seatInfo);
                card.style.gridRow = String(rowIndex * 2 + 1);
                card.style.gridColumn = String(colIndex * 2 + 1);

                content.className = "seat-card__content";
                label.className = "seat-text";
                meta.className = "seat-meta";

                if (state.resetMode) {
                    card.classList.add("resettable");
                    if (seatId) {
                        card.classList.add("selected");
                    }
                    label.textContent = seatId || TEXT.emptySlot;
                    meta.textContent = seatId ? TEXT.clickToRemove : TEXT.clickToAssign;
                    card.addEventListener("click", () => toggleResetSlot(slotIndex));
                } else {
                    card.classList.add("readonly");
                    if (showDetails) {
                        label.textContent = seatId || TEXT.emptySlot;
                        meta.textContent = seatId ? formatConfidence(seatInfo && seatInfo.confidence) : "";
                    }
                }

                if (showDetails || state.resetMode) {
                    content.appendChild(label);
                    content.appendChild(meta);
                    card.appendChild(content);
                }

                elements.seatGrid.appendChild(card);
            }

            if (showGapControls) {
                const rowGapSet = new Set(state.layoutSettings.rowGaps);
                const colGapSet = new Set(state.layoutSettings.colGaps);

                for (let colGapIndex = 0; colGapIndex < state.layoutSettings.seatCols - 1; colGapIndex += 1) {
                    const button = document.createElement("button");

                    button.type = "button";
                    button.className = "gap-toggle col" + (colGapSet.has(colGapIndex) ? " active" : "");
                    button.style.gridRow = "1 / " + (state.layoutSettings.seatRows * 2);
                    button.style.gridColumn = String(colGapIndex * 2 + 2);
                    button.setAttribute("aria-label", "열 간격 조정");
                    button.addEventListener("click", () => toggleStoredGap("col", colGapIndex));
                    elements.seatGrid.appendChild(button);
                }

                for (let rowGapIndex = 0; rowGapIndex < state.layoutSettings.seatRows - 1; rowGapIndex += 1) {
                    const button = document.createElement("button");

                    button.type = "button";
                    button.className = "gap-toggle row" + (rowGapSet.has(rowGapIndex) ? " active" : "");
                    button.style.gridRow = String(rowGapIndex * 2 + 2);
                    button.style.gridColumn = "1 / " + (state.layoutSettings.seatCols * 2);
                    button.setAttribute("aria-label", "행 간격 조정");
                    button.addEventListener("click", () => toggleStoredGap("row", rowGapIndex));
                    elements.seatGrid.appendChild(button);
                }
            }
        }

        function renderGapEditor() {
            elements.gapEditor.innerHTML = "";
        }

        function render() {
            renderControls();
            renderStats();
            renderBoard();
            renderGapEditor();
            scheduleViewportFit();
        }

        function applyLiveStatusSnapshot(rawValue) {
            const seats = normalizeLiveSeats(rawValue && rawValue.seats);
            const seatsById = {};

            seats.forEach((seat) => {
                seatsById[seat.seat_id] = seat;
            });

            state.liveStatus = {
                seatsById,
                emptyCount: Number.isFinite(Number(rawValue && rawValue.empty_count))
                    ? Number(rawValue.empty_count)
                    : seats.filter((seat) => seat.state === "empty").length,
                occupiedCount: Number.isFinite(Number(rawValue && rawValue.occupied_count))
                    ? Number(rawValue.occupied_count)
                    : seats.filter((seat) => seat.state === "occupied").length,
                uncertainCount: Number.isFinite(Number(rawValue && rawValue.uncertain_count))
                    ? Number(rawValue.uncertain_count)
                    : seats.filter((seat) => seat.state === "uncertain").length,
                updatedAt: rawValue && rawValue.updated_at ? rawValue.updated_at : ""
            };

            renderStats();
            renderBoard();
        }

        function shouldApplyRemoteLayout(remoteUpdatedAt) {
            const localBarrierUpdatedAt = Math.max(state.layoutUpdatedAt, state.pendingLayoutUpdatedAt);

            if (!remoteUpdatedAt && localBarrierUpdatedAt) {
                return false;
            }

            if (remoteUpdatedAt && localBarrierUpdatedAt && remoteUpdatedAt < localBarrierUpdatedAt) {
                return false;
            }

            return true;
        }

        function deferLayoutSnapshot(rawValue) {
            deferredLayoutSnapshot = rawValue;
        }

        function flushDeferredLayoutSnapshot() {
            if (!deferredLayoutSnapshot || state.resetMode || state.pendingLayoutUpdatedAt) {
                return;
            }

            const nextSnapshot = deferredLayoutSnapshot;
            deferredLayoutSnapshot = null;
            applyLayoutSnapshot(nextSnapshot);
        }

        async function refreshLayoutSnapshot() {
            if (!layoutRef || state.resetMode || state.pendingLayoutUpdatedAt) {
                return;
            }

            try {
                const snapshot = await layoutRef.once("value");
                applyLayoutSnapshot(snapshot.val());
            } catch (error) {
                console.error("Firebase layout refresh error:", error);
            }
        }

        function syncVisualRotation(immediate = false) {
            const targetRotation180 = state.layoutSettings.rotation180;

            if (immediate) {
                state.visualRotation180 = targetRotation180;
                state.visualRotationDeg = targetRotation180 ? 180 : 0;
                return;
            }

            if (state.visualRotation180 !== targetRotation180) {
                state.visualRotation180 = targetRotation180;
                state.visualRotationDeg += 180;
            }
        }

        function applyLayoutSnapshot(rawValue) {
            if (!rawValue) {
                return;
            }

            if (state.resetMode || state.pendingLayoutUpdatedAt) {
                deferLayoutSnapshot(rawValue);
                return;
            }

            const layoutSettings = getLayoutSettingsFromPayload(rawValue);

            if (!layoutSettings) {
                return;
            }

            const remoteUpdatedAt = parseTimestamp(rawValue.updated_at);

            if (!shouldApplyRemoteLayout(remoteUpdatedAt)) {
                return;
            }

            const slotCount = getSlotCount(layoutSettings);
            const nextSeatOrder = Object.prototype.hasOwnProperty.call(rawValue, "seatOrder")
                ? normalizeSeatOrder(rawValue.seatOrder, slotCount)
                : buildDefaultSeatOrder(slotCount);

            state.layoutSettings = layoutSettings;
            state.seatOrder = nextSeatOrder;
            state.layoutUpdatedAt = remoteUpdatedAt || state.layoutUpdatedAt;
            cacheLayoutState();
            render();
        }

        async function saveLayoutConfig() {
            cacheLayoutState();

            const nextLayoutUpdatedAt = Date.now();
            const payload = {
                layoutSettings: state.layoutSettings,
                seatOrder: serializeSeatOrder(state.seatOrder),
                updated_at: new Date(nextLayoutUpdatedAt).toISOString()
            };

            if (!layoutRef) {
                flushDeferredLayoutSnapshot();
                return;
            }

            state.pendingLayoutUpdatedAt = nextLayoutUpdatedAt;
            let didSaveSucceed = false;

            try {
                await layoutRef.set(payload);
                state.layoutUpdatedAt = nextLayoutUpdatedAt;
                didSaveSucceed = true;
            } catch (error) {
                console.error("Firebase layout save error:", error);
            } finally {
                state.pendingLayoutUpdatedAt = 0;
                cacheLayoutState();
                flushDeferredLayoutSnapshot();

                if (!didSaveSucceed) {
                    refreshLayoutSnapshot();
                }
            }
        }

        function toggleResetSlot(slotIndex) {
            const currentIndex = state.resetSelection.indexOf(slotIndex);

            if (currentIndex >= 0) {
                state.resetSelection.splice(currentIndex, 1);
            } else if (slotIndex >= 0 && slotIndex < getSlotCount()) {
                state.resetSelection.push(slotIndex);
            }

            renderBoard();
        }

        function openOrCloseSettings() {
            const wasResetMode = state.resetMode;
            state.settingsOpen = !state.settingsOpen;

            if (!state.settingsOpen) {
                state.resetMode = false;
                state.resetSelection = [];
            }

            render();

            if (wasResetMode && !state.resetMode) {
                flushDeferredLayoutSnapshot();
                refreshLayoutSnapshot();
            }
        }

        function toggleExpertMode() {
            state.expertMode = !state.expertMode;
            render();
        }

        async function applyDimensions() {
            const wasResetMode = state.resetMode;
            const nextRows = normalizeInt(elements.rowsInput.value, state.layoutSettings.seatRows);
            const nextCols = normalizeInt(elements.colsInput.value, state.layoutSettings.seatCols);

            state.layoutSettings = normalizeLayoutSettings({
                seatRows: nextRows,
                seatCols: nextCols,
                colGaps: state.layoutSettings.colGaps.filter((index) => index < nextCols - 1),
                rowGaps: state.layoutSettings.rowGaps.filter((index) => index < nextRows - 1),
                rotation180: state.layoutSettings.rotation180
            });
            state.seatOrder = normalizeSeatOrder(state.seatOrder, getSlotCount(), state.seatOrder);
            state.resetMode = false;
            state.resetSelection = [];
            render();
            await saveLayoutConfig();

            if (wasResetMode) {
                flushDeferredLayoutSnapshot();
            }
        }

        async function toggleStoredGap(kind, storedIndex) {
            const key = kind === "col" ? "colGaps" : "rowGaps";
            const nextList = [...state.layoutSettings[key]];
            const existingIndex = nextList.indexOf(storedIndex);

            if (existingIndex >= 0) {
                nextList.splice(existingIndex, 1);
            } else {
                nextList.push(storedIndex);
                nextList.sort((left, right) => left - right);
            }

            state.layoutSettings = normalizeLayoutSettings({
                ...state.layoutSettings,
                [key]: nextList
            });
            render();
            await saveLayoutConfig();
        }

        async function toggleGap(kind, displayIndex) {
            await toggleStoredGap(kind, mapGapIndex(kind, displayIndex));
        }

        async function toggleRotation() {
            state.rotationAnimationUntil = Date.now() + 250;
            state.layoutSettings = normalizeLayoutSettings({
                ...state.layoutSettings,
                rotation180: !state.layoutSettings.rotation180
            });
            render();
            await saveLayoutConfig();
        }

        function startSeatReset() {
            state.resetMode = true;
            state.resetSelection = [];
            render();
        }

        async function finishSeatReset() {
            state.seatOrder = buildPreviewSeatOrder();
            state.resetMode = false;
            state.resetSelection = [];
            render();
            await saveLayoutConfig();
            flushDeferredLayoutSnapshot();
        }

        function initializeFirebase() {
            try {
                if (!firebase.apps.length) {
                    firebase.initializeApp(firebaseConfig);
                }

                state.firebaseReady = true;
                const db = firebase.database();
                layoutRef = db.ref(LAYOUT_CONFIG_PATH);

                db.ref(LIVE_STATUS_PATH).on("value", (snapshot) => {
                    applyLiveStatusSnapshot(snapshot.val() || {});
                }, (error) => {
                    elements.updateTime.textContent = TEXT.connectionError;
                    console.error("Firebase live status error:", error);
                });

                layoutRef.on("value", (snapshot) => {
                    applyLayoutSnapshot(snapshot.val());
                }, (error) => {
                    console.error("Firebase layout sync error:", error);
                });
            } catch (error) {
                elements.updateTime.textContent = TEXT.connectionError;
                console.error("Firebase init error:", error);
            }
        }

        elements.settingsToggle.addEventListener("click", openOrCloseSettings);
        elements.modeToggle.addEventListener("click", toggleExpertMode);
        elements.applyDimensions.addEventListener("click", () => {
            applyDimensions();
        });
        elements.rotateLayout.addEventListener("click", () => {
            toggleRotation();
        });
        elements.resetSeats.addEventListener("click", () => {
            if (state.resetMode) {
                finishSeatReset();
            } else {
                startSeatReset();
            }
        });
        window.addEventListener("resize", scheduleViewportFit);
        window.addEventListener("load", scheduleViewportFit);

        renderStaticText();
        loadSavedLayout();
        render();
        initializeFirebase();
    </script>
</body>
</html>
